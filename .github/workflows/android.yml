name: CorePatch-PL

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: 21
        distribution: 'temurin'
        cache: 'gradle'

    - name: Write key
      if: github.event_name != 'pull_request'
      run: |
        if [ ! -z "${{ secrets.SIGNING_KEY }}" ]; then
          echo releaseStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
          echo releaseKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
          echo releaseKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
          echo releaseStoreFile='key.jks' >> gradle.properties
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > key.jks
        fi

    - name: Build with Gradle
      run: ./gradlew assembleRelease assembleDebug

    - name: Move and Rename APKs
      run: |
        mkdir -p out_apks
        find . -type f -name "*.apk" ! -path "*/build-src/*" | while read -r file; do
          if [[ "$file" == *"debug"* ]]; then
            cp "$file" "out_apks/CorePatch-PL-debug.apk"
          else
            cp "$file" "out_apks/CorePatch-PL.apk"
          fi
        done

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CorePatch-PL
        path: out_apks/
        if-no-files-found: warn
  
    - name: Release
      if: github.event_name != 'pull_request'
      uses: softprops/action-gh-release@v1
      with:
        files: out_apks/*.apk
        tag_name: CorePatch-PL-4.9
        generate_release_notes: true
        make_latest: true
      env:
        GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
